unbind r
bind r source-file ~/.config/tmux/tmux.conf
# Set the new prefix to Alt+a (M-a)
set -g prefix M-f

# Set the indexing to 1
set -g base-index 1
set -g mouse on
# using the vim keybinds to navigate
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# bar to the top
set-option -g status-position top


# 1. Enable True Color support (crucial for end-4's generated colors)
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-features ',xterm-kitty:RGB' # Change 'kitty' to your terminal name if using foot/wezterm

# 2. Make pane backgrounds transparent
# This allows the Hyprland/AGS blur effects to show through tmux panes
set -g window-style bg=terminal
set -g window-active-style bg=terminal

# 3. Minimalist Status Bar (Inherits end-4's dynamic terminal colors)
set -g status-style bg=terminal,fg=terminal
set -g status-left-length 20
set -g status-right-length 50

# Format the window tabs to look clean
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #[bold,bg=colour4,fg=colour0] #I:#W #[default] "



# set the default-shell
set-option -g default-shell /usr/bin/fish

# List of plugins
set -g @plugin 'tmux-plugins/tpm'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
